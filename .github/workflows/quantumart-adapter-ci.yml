name: QuantumArt Adapter Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: python -m pip install PyYAML==6.0.2
      - name: Compile adapter
        run: python -m py_compile adapters/quantumart_protocol_adapter.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
