name: QuantumArt Adapter Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile integration modules
        run: python -m py_compile adapters/quantumart_protocol_adapter.py render_v2.py

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
